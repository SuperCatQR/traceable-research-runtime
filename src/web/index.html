<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Traceable Research</title>
<style>
:root{--ink:#18211d;--muted:#68736d;--paper:#eef2ec;--panel:#f9fbf7;--line:#cbd4cc;--signal:#176b4d;--warn:#a84b2f;--data:#26495f}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font:16px/1.55 "Segoe UI","Microsoft YaHei",sans-serif}.shell{max-width:1180px;margin:auto;padding:42px 24px 64px}header{display:grid;grid-template-columns:1.4fr .6fr;gap:32px;border-bottom:2px solid var(--ink);padding-bottom:24px}h1{font:700 clamp(38px,7vw,76px)/.95 Georgia,"Songti SC",serif;letter-spacing:-.04em;margin:0}.tag{align-self:end;color:var(--muted);font-size:14px}.workspace{display:grid;grid-template-columns:minmax(0,1.3fr) minmax(290px,.7fr);gap:20px;margin-top:24px}.card{background:var(--panel);border:1px solid var(--line);padding:22px}.label{display:block;font:700 12px/1.2 Consolas,monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--signal);margin-bottom:10px}textarea{width:100%;min-height:140px;resize:vertical;border:0;border-bottom:2px solid var(--ink);background:transparent;padding:8px 0;font:24px/1.45 Georgia,"Songti SC",serif;color:var(--ink)}textarea:focus{outline:3px solid #9bcbb8;outline-offset:5px}.options{display:flex;align-items:center;gap:10px;margin-top:16px}.options label{font-weight:700}.options select{padding:7px 10px;border:1px solid var(--line);background:white;color:var(--ink)}button{margin-top:18px;border:0;background:var(--ink);color:white;padding:12px 20px;font-weight:700;cursor:pointer}button:hover{background:var(--signal)}button:disabled{opacity:.45;cursor:not-allowed}.meter{display:flex;align-items:center;gap:10px}.pulse{width:12px;height:12px;border-radius:50%;background:var(--line)}.running .pulse{background:var(--signal);animation:pulse 1.2s infinite}.failed .pulse{background:var(--warn)}@keyframes pulse{50%{transform:scale(1.5);opacity:.35}}.counts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:22px}.count{border-top:1px solid var(--line);padding-top:8px}.count b{display:block;font:700 25px Consolas,monospace}.count span{font-size:12px;color:var(--muted)}#events{height:320px;overflow:auto;background:#17231d;color:#bfe4d3;padding:14px;font:12px/1.55 Consolas,monospace;white-space:pre-wrap}.result{margin-top:20px}.result h2{font:700 32px Georgia,"Songti SC",serif}.claim{border-left:4px solid var(--signal);padding:2px 0 2px 16px;margin:18px 0}.sources{margin:8px 0 0;padding-left:18px}.sources a{color:var(--data)}.hidden{display:none}@media(max-width:760px){header,.workspace{grid-template-columns:1fr}.shell{padding:24px 14px}.tag{align-self:auto}}
@media(prefers-reduced-motion:reduce){.running .pulse{animation:none}}
</style>
</head>
<body><main class="shell"><header><h1>Traceable<br>Research</h1><div class="tag">搜索、冻结、校验、作答。<br>每条结论回到可点击来源。</div></header>
<section class="workspace"><div><div class="card"><label class="label" for="question">Research question</label><textarea id="question" placeholder="输入需要深入调查的问题…"></textarea><div class="options"><label for="rounds">查询轮数</label><select id="rounds"><option value="3" selected>3 轮</option><option value="4">4 轮</option><option value="5">5 轮</option></select></div><button id="start">开始研究</button></div><div id="result" class="card result hidden"></div></div>
<aside><div id="status" class="card"><span class="label">Live run</span><div class="meter"><i class="pulse"></i><strong id="stage">等待问题</strong></div><div class="counts"><div class="count"><b id="queries">0</b><span>查询</span></div><div class="count"><b id="archives">0</b><span>快照</span></div><div class="count"><b id="skips">0</b><span>跳过</span></div></div></div><pre id="events" aria-live="polite">尚未开始。</pre></aside></section></main>
<script>
const $=id=>document.getElementById(id), start=$('start'), status=$('status'), events=$('events');let counts={query:0,archive:0,archive_skip:0};
function text(tag,value,cls){const el=document.createElement(tag);el.textContent=value;if(cls)el.className=cls;return el}
function render(result){const box=$('result');box.replaceChildren(text('span','Research answer','label'),text('h2',result.answer));for(const claim of result.claims){const c=text('div',claim.text,'claim'),ul=text('ul','', 'sources');for(const source of claim.sources){const li=document.createElement('li'),a=document.createElement('a');a.textContent=source.title||source.url;a.href=source.url;a.target='_blank';a.rel='noopener noreferrer';li.append(a);ul.append(li)}c.append(ul);box.append(c)}box.classList.remove('hidden')}
function onTrace(raw){const e=JSON.parse(raw);events.textContent+=`\n${e.type} ${e.query||e.title||e.reason||''}`;events.scrollTop=events.scrollHeight;if(e.type in counts){counts[e.type]++;$('queries').textContent=counts.query;$('archives').textContent=counts.archive;$('skips').textContent=counts.archive_skip}const stages={run_header:'已启动',query:'规划与搜索',search_result:'发现候选',archive:'保存快照',archive_skip:'跳过不可用页面',excerpt:'整理证据',snapshot_selection:'选择证据',claim:'组织主张',answer:'完成',run_failed:'失败'};$('stage').textContent=stages[e.type]||e.type}
async function finish(runId){const r=await fetch(`/api/research/${runId}`),d=await r.json();status.className='card '+d.status;$('stage').textContent=d.status==='completed'?'已完成':`失败：${d.error?.message||'unknown'}`;if(d.result)render(d.result);start.disabled=false}
start.onclick=async()=>{const question=$('question').value.trim();if(!question)return;$('result').classList.add('hidden');events.textContent='连接任务…';counts={query:0,archive:0,archive_skip:0};['queries','archives','skips'].forEach(id=>$(id).textContent='0');start.disabled=true;status.className='card running';const r=await fetch('/api/research',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question,rounds:Number($('rounds').value)})});if(!r.ok){events.textContent=await r.text();start.disabled=false;return}const {run_id}=await r.json(),source=new EventSource(`/api/research/${run_id}/events`);source.addEventListener('trace',e=>onTrace(e.data));source.addEventListener('done',()=>{source.close();finish(run_id)});source.onerror=()=>{source.close();finish(run_id)}};
</script></body></html>
